name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint the code
        run: pnpm lint

      # - name: Analyze unused files and dependencies
      #   run: pnpm knip

      - name: Run Prettier check
        run: pnpm format:check

      - name: Build the project
        run: pnpm build

  package-tauri:
    name: Package Tauri (${{ matrix.os }})
    needs: install-lint-build
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: dmg
          - os: windows-latest
            bundle: nsis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS bundled helpers
        if: matrix.os == 'macos-latest'
        run: |
          brew install --cask libreoffice
          brew install sevenzip
          mkdir -p src-tauri/vendor/libreoffice src-tauri/bin
          cp -R /Applications/LibreOffice.app src-tauri/vendor/libreoffice/
          cp "$(command -v 7zz)" src-tauri/bin/7zz

      - name: Install Windows bundled helpers
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install libreoffice-fresh 7zip -y --no-progress
          New-Item -ItemType Directory -Force src-tauri/vendor/libreoffice, src-tauri/bin
          Copy-Item "C:\Program Files\LibreOffice" "src-tauri\vendor\libreoffice\LibreOffice" -Recurse -Force
          if (Test-Path "C:\Program Files\7-Zip\7zz.exe") {
            Copy-Item "C:\Program Files\7-Zip\7zz.exe" "src-tauri\bin\7zz.exe" -Force
          }
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "src-tauri\bin\7z.exe" -Force
          Copy-Item "C:\Program Files\7-Zip\7z.dll" "src-tauri\bin\7z.dll" -Force

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app package
        run: pnpm exec tauri build --ci --no-sign --bundles ${{ matrix.bundle }}

      - name: Upload app package
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}-${{ matrix.bundle }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error
